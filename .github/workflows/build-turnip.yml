name: Turnip adrenotools

on:
  push:
    paths:
      - "CHANGELOGS.md"

  workflow_dispatch:

permissions:
  contents: write

env:
  API_VER: 35
  BUILD_VARIANT: p2

jobs:
  build:
    runs-on: ubuntu-26.04-arm

    container:
      image: debian:sid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        run: |
          apt update &> /dev/null && apt install sudo -y &> /dev/null && bash Build-turnip.sh

      - name: Debug zip output
        run: |
          find turnip_workdir -type f -name "*.zip" -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-build
          path: turnip_workdir/turnip/*.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body_path: ${{ github.workspace }}/CHANGELOGS.md
          files: turnip_workdir/turnip/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
