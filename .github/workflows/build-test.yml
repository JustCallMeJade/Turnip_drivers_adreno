name: Build Turnip

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    container:
      image: debian:sid

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y bash zip findutils

      - name: Run build script
        run: |
          chmod +x turnip-aarch64-linux.sh
          ./turnip-aarch64-linux.sh

      - name: Debug output
        run: |
          echo "Where zip actually is:"
          find / -name "*.zip" 2>/dev/null || true
          echo "Workspace view:"
          find . -name "*.zip" -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-build
          path: |
            turnip_workdir/turnip/*.zip
          if-no-files-found: error
